<!DOCTYPE html>
<html>
<head>
    <title>Age Form</title>
</head>
<body>
    <h1>Enter Your Info</h1>

    <form>
        Name: <input type="text">
        <br>
        <br>

        Age: <input type="number">
        <br>
        <br>

        Grade Level:
        <br>
        <input type="radio" name="grade"> 6th
        <br>
        <input type="radio" name="grade"> 7th
        <br>
        <input type="radio" name="grade"> 8th
        <br>
        <br>

        Coding Skill (1-10):
        <input type="range" min="1" max="10">
        <br>
        <br>

        <button type="button">Submit</button>
    </form>
</body>
</html>
